<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Voxel Garden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:system-ui,sans-serif}
#c{width:100vw;height:100vh;display:block}
#time-badge{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.45);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);border-radius:20px;
  padding:5px 14px;font-size:12px;color:rgba(255,255,255,.8);
  pointer-events:none;letter-spacing:.04em;z-index:100;
}
#amb-fab{
  position:fixed;bottom:24px;right:16px;
  width:42px;height:42px;border-radius:50%;
  background:rgba(20,20,30,.7);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.2);color:#fff;
  font-size:18px;cursor:pointer;z-index:900;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:transform .15s,background .15s;
}
#amb-fab:hover{transform:scale(1.08);background:rgba(40,40,60,.8)}
#amb-panel{
  position:fixed;bottom:78px;right:16px;width:230px;
  background:rgba(14,16,22,.75);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.13);border-radius:14px;
  padding:14px 16px 12px;z-index:901;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:opacity .2s,transform .2s;transform-origin:bottom right;
}
#amb-panel.hidden{opacity:0;pointer-events:none;transform:scale(.92) translateY(8px)}
.ap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ap-title{font-size:11px;font-weight:600;letter-spacing:.07em;color:rgba(255,255,255,.6);text-transform:uppercase}
.ap-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:14px;cursor:pointer;padding:0;line-height:1}
.ap-close:hover{color:#fff}
.ap-row{display:flex;flex-direction:column;gap:4px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.ap-row:last-child{border-bottom:none}
.ap-lbl{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.8)}
.ap-val{font-size:11px;color:rgba(255,255,255,.4);min-width:32px;text-align:right}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.2);border-radius:4px;margin-top:4px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.5)}
.ap-reset{margin-top:10px;width:100%;padding:6px;border-radius:8px;font-size:11px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.65);cursor:pointer;transition:background .15s}
.ap-reset:hover{background:rgba(255,255,255,.2);color:#fff}

/* ── Todo ── */
#todo-fab{
  position:fixed;bottom:24px;left:16px;
  width:42px;height:42px;border-radius:50%;
  background:rgba(20,20,30,.7);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.2);color:#fff;
  font-size:18px;cursor:pointer;z-index:900;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:transform .15s,background .15s;
}
#todo-fab:hover{transform:scale(1.08);background:rgba(40,40,60,.8)}
#todo-panel{
  position:fixed;bottom:78px;left:16px;width:260px;
  background:rgba(14,16,22,.78);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.13);border-radius:14px;
  padding:14px 16px 12px;z-index:901;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:opacity .2s,transform .2s;transform-origin:bottom left;
  max-height:420px;display:flex;flex-direction:column;gap:10px;
}
#todo-panel.hidden{opacity:0;pointer-events:none;transform:scale(.92) translateY(8px)}
.td-head{display:flex;align-items:center;justify-content:space-between}
.td-title{font-size:11px;font-weight:600;letter-spacing:.07em;color:rgba(255,255,255,.6);text-transform:uppercase}
.td-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:14px;cursor:pointer;padding:0;line-height:1}
.td-close:hover{color:#fff}
#todo-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.td-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);transition:background .15s;cursor:pointer}
.td-item:hover{background:rgba(255,255,255,.09)}
.td-item.done{opacity:.45}
.td-item.done .td-text{text-decoration:line-through}
.td-check{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.td-item.done .td-check{background:#4a9a5a;border-color:#4a9a5a}
.td-text{font-size:13px;color:rgba(255,255,255,.85);flex:1;word-break:break-word;line-height:1.35}
.td-del{background:none;border:none;color:rgba(255,255,255,.2);font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;transition:color .15s}
.td-del:hover{color:rgba(255,100,100,.8)}
.td-add{display:flex;gap:6px}
#todo-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;
  padding:7px 10px;font-size:13px;color:#fff;outline:none;transition:border .15s}
#todo-input::placeholder{color:rgba(255,255,255,.3)}
#todo-input:focus{border-color:rgba(255,255,255,.35)}
#todo-add-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:8px;
  color:#fff;font-size:18px;width:34px;cursor:pointer;transition:background .15s;flex-shrink:0}
#todo-add-btn:hover{background:rgba(255,255,255,.22)}

#lamp-tooltip{
  position:fixed;pointer-events:none;z-index:999;
  background:rgba(10,12,18,.82);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);border-radius:8px;
  padding:6px 11px;font-size:12px;color:rgba(255,255,255,.9);
  max-width:200px;line-height:1.4;white-space:pre-wrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:opacity .1s;
}
#lamp-tooltip.hidden{opacity:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lamp-tooltip" class="hidden"></div>
<div id="time-badge">☀️ Day</div>
<button id="amb-fab">🌙</button>
<button id="todo-fab">✏️</button>
<div id="todo-panel" class="hidden">
  <div class="td-head">
    <span class="td-title">Tasks</span>
    <button class="td-close" id="td-close">✕</button>
  </div>
  <div id="todo-list"></div>
  <div class="td-add">
    <input id="todo-input" type="text" placeholder="Add a task…" maxlength="120">
    <button id="todo-add-btn">+</button>
  </div>
</div>
<div id="amb-panel" class="hidden">
  <div class="ap-head">
    <span class="ap-title">Ambience</span>
    <button class="ap-close" id="ap-close">✕</button>
  </div>
  <div id="ap-rows"></div>
  <button class="ap-reset" id="ap-reset">Reset</button>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/controls/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Detect mobile ─────────────────────────────────────────────────────────────
const IS_MOBILE = window.innerWidth <= 768 || ('ontouchstart' in window);

// ── Renderer ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias: !IS_MOBILE, powerPreference:'high-performance'
});
renderer.setPixelRatio(IS_MOBILE ? 1 : Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;  // shadows OFF entirely
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a3a6a');
scene.fog = new THREE.FogExp2('#1a3a6a', 0.004);

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.5, 400);
camera.position.set(0, 28, 62);

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 3, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 12;
controls.maxDistance = 120;
controls.maxPolarAngle = Math.PI * 0.52;
controls.update();

// ── Lighting — ONLY 2 lights total ───────────────────────────────────────────
const hemi = new THREE.HemisphereLight(0x6ab4f5, 0x3a6a30, 1.2);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff8e0, 1.6);
sun.position.set(60, 80, -40);
scene.add(sun);

// ── Ambience settings ─────────────────────────────────────────────────────────
const AMB = { brightness: 1.0, fogDensity: 1.0 };
const FOG_BASE = 0.004;

// ── Terrain helpers ───────────────────────────────────────────────────────────
const terrain = new Map();
const getH = (x,z) => terrain.get(`${Math.round(x)},${Math.round(z)}`) ?? 0;

// ── Shared materials (reuse aggressively) ─────────────────────────────────────
const MAT = {
  grass1:  new THREE.MeshStandardMaterial({color:'#3c583a'}),
  grass2:  new THREE.MeshStandardMaterial({color:'#4a6946'}),
  grass3:  new THREE.MeshStandardMaterial({color:'#2d422a'}),
  sand:    new THREE.MeshStandardMaterial({color:'#c8ad7a'}),
  stone:   new THREE.MeshStandardMaterial({color:'#7a7570',roughness:.95}),
  darkSt:  new THREE.MeshStandardMaterial({color:'#524e4a',roughness:.98}),
  wood:    new THREE.MeshStandardMaterial({color:'#5a3820',roughness:.85}),
  red:     new THREE.MeshStandardMaterial({color:'#cc2200',roughness:.7}),
  darkRed: new THREE.MeshStandardMaterial({color:'#881500',roughness:.7}),
  iron:    new THREE.MeshStandardMaterial({color:'#2a2a2a',roughness:.7,metalness:.4}),
  bam:     new THREE.MeshStandardMaterial({color:'#5a8a30',roughness:.8}),
  bamDark: new THREE.MeshStandardMaterial({color:'#3d6620',roughness:.9}),
  bamboPole: new THREE.MeshStandardMaterial({color:'#7a6830',roughness:.9}),
  bowlMat: new THREE.MeshStandardMaterial({color:'#4a3218',roughness:.95}),
  water:   new THREE.MeshStandardMaterial({color:'#3a7fcc',emissive:'#0a1e44',emissiveIntensity:.4,transparent:true,opacity:.75,roughness:.15}),
};

// Emissive materials — no PointLight needed, just glow
const EMIT = {
  lampGlow: new THREE.MeshStandardMaterial({color:'#fff8d0',emissive:'#ffdd66',emissiveIntensity:6,transparent:true,opacity:.9}),
  lampHalo: new THREE.MeshStandardMaterial({color:'#ffee88',emissive:'#ffcc44',emissiveIntensity:1.5,transparent:true,opacity:.07,depthWrite:false,side:THREE.BackSide}),
  lanternBody: new THREE.MeshStandardMaterial({color:'#cc1100',roughness:.65,emissive:'#880000',emissiveIntensity:1.2}),
  lanternGlow: new THREE.MeshStandardMaterial({color:'#ff4422',emissive:'#cc2200',emissiveIntensity:5.5,transparent:true,opacity:.9}),
  torchFlame: new THREE.MeshStandardMaterial({color:'#ff6600',emissive:'#ff3300',emissiveIntensity:2.5,transparent:true,opacity:.82}),
  torchOuter: new THREE.MeshStandardMaterial({color:'#ffaa00',emissive:'#ff6600',emissiveIntensity:1.2,transparent:true,opacity:.35,depthWrite:false}),
  fireCore:   new THREE.MeshStandardMaterial({color:'#ff8800',emissive:'#ff4400',emissiveIntensity:6,transparent:true,opacity:.9}),
};

// ── Terrain generation ────────────────────────────────────────────────────────
function buildTerrain(){
  const SIZE = IS_MOBILE ? 32 : 38;
  // Simple noise function
  for(let x=-SIZE;x<=SIZE;x++) for(let z=-SIZE;z<=SIZE;z++){
    const d=Math.sqrt(x*x+z*z); if(d>SIZE) continue;
    const edge=Math.max(0,1-d/SIZE);
    const h=Math.floor(2+(Math.sin(x*.18)*2.8+Math.cos(z*.15)*2.2+Math.sin((x+z)*.09)*1.8)
      *edge*1.4 + Math.max(0,1-d/20)*14);
    terrain.set(`${x},${z}`,h);
  }

  const dummy=new THREE.Object3D(), box=new THREE.BoxGeometry(1,1,1);
  const buckets=[[],[],[],[]];
  for(const [key,h] of terrain){
    const [x,z]=key.split(',').map(Number);
    if(h<=1){ buckets[3].push({x,y:h/2,z,h}); continue; }
    buckets[Math.floor(Math.random()*3)].push({x,y:h/2,z,h});
  }
  [MAT.grass1,MAT.grass2,MAT.grass3,MAT.sand].forEach((mat,mi)=>{
    const pts=buckets[mi]; if(!pts.length) return;
    const mesh=new THREE.InstancedMesh(box,mat,pts.length);
    pts.forEach((p,i)=>{dummy.position.set(p.x,p.y,p.z);dummy.scale.set(1,p.h,1);dummy.updateMatrix();mesh.setMatrixAt(i,dummy.matrix);});
    mesh.instanceMatrix.needsUpdate=true;
    scene.add(mesh);
  });

  // Water ring
  const wBox=new THREE.BoxGeometry(1,.4,1);
  const wCells=[]; for(const [key,h] of terrain){ const [x,z]=key.split(',').map(Number); if(h<=1) wCells.push({x,z}); }
  if(wCells.length){
    const wMesh=new THREE.InstancedMesh(wBox,MAT.water,wCells.length);
    wCells.forEach(({x,z},i)=>{dummy.position.set(x,1.3,z);dummy.scale.set(.98,1,.98);dummy.updateMatrix();wMesh.setMatrixAt(i,dummy.matrix);});
    wMesh.instanceMatrix.needsUpdate=true; scene.add(wMesh);
  }
}

// ── Torii gate ────────────────────────────────────────────────────────────────
function createTorii(cx,cz,rotY=0,scale=1){
  const g=new THREE.Group();
  const postH=8;

  // Sample ground height under each post in world space
  const postOffsets=[-2.2,2.2];
  const postGroundY=postOffsets.map(lx=>{
    const wx=cx+lx*Math.cos(rotY);
    const wz=cz-lx*Math.sin(rotY);
    return Math.max(getH(wx,wz), getH(wx+1,wz), getH(wx-1,wz), getH(wx,wz+1), getH(wx,wz-1));
  });
  // Place group at the lower post ground so neither floats
  const baseY=Math.min(postGroundY[0],postGroundY[1]);

  postOffsets.forEach((lx,i)=>{
    const post=new THREE.Mesh(new THREE.CylinderGeometry(.28,.35,postH,7),MAT.red);
    post.position.set(lx,4,0); g.add(post);
    // Foot extends down to match local terrain difference
    const localGround=postGroundY[i]-baseY;
    const footH=0.5+localGround;
    const foot=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,footH,7),MAT.darkRed);
    foot.position.set(lx,localGround-footH/2+0.25,0); g.add(foot);
    // Sink post 1 unit into ground
    post.position.set(lx,4+localGround-1,0);
  });

  const kasagi=new THREE.Mesh(new THREE.BoxGeometry(7.2,.55,.7),MAT.darkRed); kasagi.position.y=7.3; g.add(kasagi);
  const shimagi=new THREE.Mesh(new THREE.BoxGeometry(5.8,.4,.55),MAT.red); shimagi.position.y=6.65; g.add(shimagi);
  const nuki=new THREE.Mesh(new THREE.BoxGeometry(5.2,.35,.4),MAT.red); nuki.position.y=4.5; g.add(nuki);
  g.scale.setScalar(scale);
  g.rotation.y=rotY;
  g.position.set(cx,baseY,cz);
  scene.add(g);
}

// ── Task lamps ────────────────────────────────────────────────────────────────
// Pre-seeded random island positions (h > 3, spread across island)
const LAMP_POOL = [
  [14,8],[-8,-12],[18,-6],[-16,4],[6,-20],[22,16],[-20,-14],[4,18],
  [-10,20],[16,-18],[-24,6],[10,10],[-6,-18],[20,-14],[-14,12],[8,22],
].map(([x,z])=>[x,z]); // will filter by actual terrain on use

// Shared lamp materials — per-lamp glow gets its own instance for hover state
const lampIronMat  = new THREE.MeshStandardMaterial({color:'#2a2a2a',roughness:.7,metalness:.4});
const lampStoneMat = new THREE.MeshStandardMaterial({color:'#7a7570',roughness:.95});
const lampIronCapMat = new THREE.MeshStandardMaterial({color:'#2a2a2a',roughness:.7,metalness:.4});

const taskLamps = []; // { group, glowMat, haloMat, hitMesh, todo }

function spawnTaskLamp(x, z, todo){
  const y = getH(x, z);
  const g = new THREE.Group();

  const base  = new THREE.Mesh(new THREE.CylinderGeometry(.32,.38,.3,7), lampStoneMat);
  base.position.y = .15;
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(.06,.1,4.2,7), lampIronMat);
  shaft.position.y = 2.35;
  const cap   = new THREE.Mesh(new THREE.CylinderGeometry(0,.7,.5,4), lampIronCapMat);
  cap.position.y = 5.35; cap.rotation.y = Math.PI/4;

  // Lantern box — per-lamp material so we can tint it
  const lBoxMat = new THREE.MeshStandardMaterial({
    color:'#1a1a1a', emissive: todo.done ? '#334455' : '#ffcc44',
    emissiveIntensity: todo.done ? .5 : 1.32, roughness:.8, transparent:true, opacity:.85
  });
  const lBox = new THREE.Mesh(new THREE.BoxGeometry(.72,.72,.72), lBoxMat);
  lBox.position.y = 4.9;

  // Glow sphere — own material per lamp
  const glowMat = new THREE.MeshStandardMaterial({
    color: todo.done ? '#8ab0cc' : '#fff8d0',
    emissive: todo.done ? '#2255aa' : '#ffdd66',
    emissiveIntensity: todo.done ? 2.5 : 12,
    transparent:false, opacity:1.0
  });
  const glow = new THREE.Mesh(new THREE.SphereGeometry(.22,6,6), glowMat);
  glow.position.y = 4.9;

  // Halo — own material per lamp
  const haloMat = new THREE.MeshStandardMaterial({
    color: todo.done ? '#88aacc' : '#ffee88',
    emissive: todo.done ? '#2244aa' : '#ffcc44',
    emissiveIntensity: 1.5, transparent:true, opacity:.07, depthWrite:false, side:THREE.BackSide
  });
  const halo = new THREE.Mesh(new THREE.SphereGeometry(1.1,6,6), haloMat);
  halo.position.y = 4.9;

  // Invisible hit mesh for raycasting — taller than the visible lamp so easy to hover
  const hitGeo  = new THREE.CylinderGeometry(.6,.6,6,6);
  const hitMat  = new THREE.MeshBasicMaterial({visible:false});
  const hitMesh = new THREE.Mesh(hitGeo, hitMat);
  hitMesh.position.y = 3;

  g.add(base, shaft, lBox, glow, halo, cap, hitMesh);
  g.position.set(x, y, z);
  scene.add(g);

  const entry = { group:g, glowMat, haloMat, lBoxMat, hitMesh, todo };
  hitMesh.userData.lampEntry = entry;
  taskLamps.push(entry);
  return entry;
}

function buildTaskLamps(){
  // Remove existing
  taskLamps.forEach(l=>scene.remove(l.group));
  taskLamps.length = 0;

  // Shuffle a copy of the pool so positions vary
  const pool = [...LAMP_POOL]
    .filter(([x,z])=> getH(x,z) > 1)
    .sort(()=>Math.random()-.5);

  todos.forEach((t, i)=>{
    if(i >= pool.length) return;
    const [x,z] = pool[i];
    // Nudge slightly so lamps don't all land on same terrain level
    const nx = x + (Math.random()-.5)*2;
    const nz = z + (Math.random()-.5)*2;
    if(getH(nx, nz) <= 1) return; // nudge landed on water, skip
    spawnTaskLamp(nx, nz, t);
  });
}

// ── Hover / tooltip ───────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredLamp = null;

const tooltip = document.getElementById('lamp-tooltip');

function onPointerMove(e){
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  mouse.x = (clientX / innerWidth)  *  2 - 1;
  mouse.y = (clientY / innerHeight) * -2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = taskLamps.map(l=>l.hitMesh);
  const intersects = raycaster.intersectObjects(hits);

  if(intersects.length > 0){
    const entry = intersects[0].object.userData.lampEntry;
    if(entry !== hoveredLamp){
      // Unhover previous
      if(hoveredLamp) setLampHover(hoveredLamp, false);
      hoveredLamp = entry;
      setLampHover(entry, true);
    }
    // Position tooltip near cursor
    tooltip.style.left = (clientX + 14) + 'px';
    tooltip.style.top  = (clientY - 12) + 'px';
    tooltip.textContent = (entry.todo.done ? '✓ ' : '') + entry.todo.text;
    tooltip.classList.remove('hidden');
    canvas.style.cursor = 'pointer';
  } else {
    if(hoveredLamp){ setLampHover(hoveredLamp, false); hoveredLamp = null; }
    tooltip.classList.add('hidden');
    canvas.style.cursor = '';
  }
}

function setLampHover(entry, on){
  const done = entry.todo.done;
  entry.glowMat.emissiveIntensity = on ? (done ? 6 : 22) : (done ? 2.5 : 12);
  entry.haloMat.opacity           = on ? .25 : .09;
  entry.lBoxMat.emissiveIntensity = on ? (done ? 1.1 : 2.4) : (done ? .5 : 1.32);
}

window.addEventListener('mousemove', onPointerMove, {passive:true});
window.addEventListener('touchmove',  onPointerMove, {passive:true});

// ── Tiki torch (emissive flame, no PointLight) ────────────────────────────────
function createTikiTorch(x,z){
  const g=new THREE.Group();
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(.055,.085,.7,6),MAT.bamboPole); pole.position.y=.35;
  const bowl=new THREE.Mesh(new THREE.CylinderGeometry(.22,.12,.28,7),MAT.bowlMat); bowl.position.y=.84;
  const rim=new THREE.Mesh(new THREE.CylinderGeometry(.24,.24,.05,7),new THREE.MeshStandardMaterial({color:'#2a1e0c'})); rim.position.y=.96;

}

// ── Red lantern string (emissive only) ────────────────────────────────────────
function createLanternString(ax,az,bx,bz,count=5,h=7){
  const postMat=new THREE.MeshStandardMaterial({color:'#2a2218',roughness:.8});
  const ay=getH(ax,az)+h, by=getH(bx,bz)+h;
  for(let i=0;i<=count;i++){
    const t=i/count;
    const lx=ax+(bx-ax)*t, lz=az+(bz-az)*t;
    const sag=Math.sin(t*Math.PI)*2.8;
    const ly=ay+(by-ay)*t-sag;
    if(i===0||i===count){
      const gy=getH(lx,lz);
      const postH=Math.max(1.5,ly-gy+.2);
      const post=new THREE.Mesh(new THREE.CylinderGeometry(.12,.15,postH,7),postMat);
      post.position.set(lx,gy+postH/2,lz); scene.add(post);
    }
    if(i>0&&i<count){
      const lg=new THREE.Group();
      const body=new THREE.Mesh(new THREE.CylinderGeometry(.38,.38,.9,8),EMIT.lanternBody);
      const topC=new THREE.Mesh(new THREE.CylinderGeometry(.22,.38,.18,8),postMat); topC.position.y=.54;
      const botC=new THREE.Mesh(new THREE.CylinderGeometry(.38,.22,.18,8),postMat); botC.position.y=-.54;
      const glw=new THREE.Mesh(new THREE.SphereGeometry(.26,6,6),EMIT.lanternGlow);
      lg.add(body,topC,botC,glw);
      lg.position.set(lx,ly-.95,lz);
      scene.add(lg);
    }
  }
}

// ── Bamboo grove (instanced) ──────────────────────────────────────────────────
function createBambooGrove(cx,cz,count=IS_MOBILE?8:18){
  const culmG=new THREE.CylinderGeometry(.12,.15,7,5);
  const nodeG=new THREE.CylinderGeometry(.18,.18,.2,5);
  const dummy=new THREE.Object3D();
  const culmM=new THREE.InstancedMesh(culmG,MAT.bam,count);
  const nodeM=new THREE.InstancedMesh(nodeG,MAT.bamDark,count*2);
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*4.5;
    const x=cx+Math.cos(a)*r, z=cz+Math.sin(a)*r;
    const y=getH(x,z), h=5+Math.random()*3;
    dummy.position.set(x,y+h/2,z); dummy.scale.set(1,h/7,1);
    dummy.rotation.set((Math.random()-.5)*.1,Math.random()*Math.PI*2,(Math.random()-.5)*.1);
    dummy.updateMatrix(); culmM.setMatrixAt(i,dummy.matrix);
    [.35,.65].forEach((f,ni)=>{
      dummy.position.set(x,y+h*f,z); dummy.scale.setScalar(1); dummy.rotation.set(0,0,0);
      dummy.updateMatrix(); nodeM.setMatrixAt(i*2+ni,dummy.matrix);
    });
  }
  culmM.instanceMatrix.needsUpdate=nodeM.instanceMatrix.needsUpdate=true;
  scene.add(culmM,nodeM);
}

// ── Simple tree (no per-tree light, no petals) ────────────────────────────────
function createTree(x,z){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.2,.3,2.5,6),MAT.wood); trunk.position.y=1.25;
  const pinkMat=new THREE.MeshStandardMaterial({color:'#f4a0c0',roughness:.9});
  const pinkDark=new THREE.MeshStandardMaterial({color:'#d46090',roughness:.9});
  [[0,3.8,0,2.2],[1.2,3.2,.8,1.6],[-1.0,3.0,.5,1.4],[.4,4.4,-.6,1.8],[-1.4,3.5,-.8,1.3]].forEach(([bx,by,bz,r])=>{
    const cloud=new THREE.Mesh(new THREE.DodecahedronGeometry(r,0),Math.random()>.4?pinkMat:pinkDark);
    cloud.position.set(bx,by,bz); g.add(cloud);

// ── Simple shrine ─────────────────────────────────────────────────────────────
function createShrine(x,z){
  const g=new THREE.Group();

// ── Simple dock ───────────────────────────────────────────────────────────────
function createDock(x,z,angle=0){
  const g=new THREE.Group();
  const plankMat=new THREE.MeshStandardMaterial({color:'#7a5c3a',roughness:.95});
  const postMat=new THREE.MeshStandardMaterial({color:'#5a3c20',roughness:.98});
  for(let i=0;i<6;i++){
    const p=new THREE.Mesh(new THREE.BoxGeometry(.9,.1,1.0),plankMat);
    p.position.set(0,.05,i*1.08); g.add(p);
  }
  [-.38,.38].forEach(side=>{
    const pile=new THREE.Mesh(new THREE.CylinderGeometry(.07,.09,2.2,5),postMat);
    pile.position.set(side,-1.05,2.7); g.add(pile);
  });
  g.rotation.y=angle; g.position.set(x,getH(x,z),z);
  scene.add(g);
}

// ── Rocks (instanced) ─────────────────────────────────────────────────────────
function createRocks(){
  const rockMat=new THREE.MeshStandardMaterial({color:'#7a7a72',roughness:.95});
  const geo=new THREE.DodecahedronGeometry(.6,0);
  const COUNT=IS_MOBILE?20:35;
  const dummy=new THREE.Object3D();
  const mesh=new THREE.InstancedMesh(geo,rockMat,COUNT);
  let placed=0;
  for(let attempt=0;attempt<400&&placed<COUNT;attempt++){
    const a=Math.random()*Math.PI*2, r=4+Math.random()*28;
    const x=Math.cos(a)*r, z=Math.sin(a)*r, y=getH(x,z);
    if(y<2) continue;
    const s=.4+Math.random()*.8;
    dummy.position.set(x,y+.1,z); dummy.scale.setScalar(s);
    dummy.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    dummy.updateMatrix(); mesh.setMatrixAt(placed++,dummy.matrix);
  }
  mesh.count=placed; mesh.instanceMatrix.needsUpdate=true;
  scene.add(mesh);
}

// ── Time of day ───────────────────────────────────────────────────────────────
function applyTime(){
  const now=new Date(), hour=now.getHours()+now.getMinutes()/60;
  let day; if(hour<5)day=0; else if(hour<7)day=(hour-5)/2; else if(hour<18)day=1; else if(hour<20)day=1-(hour-18)/2; else day=0;
  const night=1-day;
  const golden=Math.max(
    (hour>4.5&&hour<7.5)?Math.sin((hour-4.5)/3*Math.PI):0,
    (hour>17&&hour<21)?Math.sin((hour-17)/4*Math.PI):0
  );
  // Sky
  const sky=new THREE.Color().lerpColors(new THREE.Color('#0d1220'),new THREE.Color('#1a6ab0'),day);
  if(golden>.01) sky.lerp(new THREE.Color('#c04010'),golden*.7);
  scene.background=sky; scene.fog.color.copy(sky);
  // Hemi
  hemi.intensity = IS_MOBILE ? (0.9+day*0.8) : (0.8+day*1.0);
  hemi.color.lerpColors(new THREE.Color('#0d122a'),new THREE.Color('#6ab4f5'),day);
  if(golden>.01) hemi.color.lerp(new THREE.Color('#ff6622'),golden*.6);
  // Sun
  sun.intensity=day*1.8+golden*.5;
  sun.color.lerpColors(new THREE.Color('#8899cc'),new THREE.Color('#fff8e0'),day);
  if(golden>.2) sun.color.lerp(new THREE.Color('#ff7700'),golden*.8);
  // Exposure
  renderer.toneMappingExposure=(.65+day*.45)*AMB.brightness;
  // Badge
  const badge=document.getElementById('time-badge');
  if(badge){
    const ts=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    let phase=hour>=21||hour<5?'🌙 Night':hour<7?'🌅 Dawn':hour<18?'☀️ Day':'🌇 Dusk';
    badge.textContent=phase+' · '+ts;
  }
}

// Planted near the shrine at (-18, 14)

// Bamboo pole

// Strip colours — pending are vivid, done are muted/grey
const STRIP_COLORS = [
  '#e8507a','#5ab4e8','#e8c84a','#7ad478','#c87ae8',
  '#e87850','#4ae8d4','#e8e87a','#d47ab4','#78a0e8',
];
const DONE_EMISSIVE = '#303030';
const stripMeshes = []; // parallel to todos array

function buildStrips(){
  // Remove old strip meshes
  stripMeshes.forEach(m=>tanzakuGroup.remove(m));
  stripMeshes.length = 0;

  const MAX = 10; // cap at 10 strips so it doesn't get absurd
  const visible = todos.slice(0, MAX);
  const total = visible.length;

  visible.forEach((t, i)=>{
    const col = STRIP_COLORS[i % STRIP_COLORS.length];
    const mat = new THREE.MeshStandardMaterial({
      color: t.done ? '#888' : col,
      emissive: t.done ? DONE_EMISSIVE : col,
      emissiveIntensity: t.done ? 0.08 : 0.55,
      roughness: .8,
    });

    // Hang position along crossbar — spread across -0.9 to +0.9
    const spread = total > 1 ? (i/(total-1)) * 1.8 - 0.9 : 0;
    // Slight random dangle offset per strip (seeded from id)
    const seed = (t.id || i) % 100;
    const sway = (seed/100 - 0.5) * 0.18;
    const hang = 0.28 + (seed % 5) * 0.06; // how far below bar

    const strip = new THREE.Mesh(new THREE.BoxGeometry(.13,.48,.025), mat);
    strip.position.set(spread, 5.1 - hang, 0);
    strip.rotation.z = sway;

    // Tiny string connecting strip to bar
    const string = new THREE.Mesh(
      new THREE.CylinderGeometry(.008,.008, hang, 3),
      new THREE.MeshStandardMaterial({color:'#c8c0a0'})
    );
    string.position.set(spread, 5.1 - hang/2, 0);

    tanzakuGroup.add(string, strip);
    stripMeshes.push(string, strip);
  });
}

// ── Todo logic ────────────────────────────────────────────────────────────────
const STORE_KEY = 'vg-todos';
let todos = [];
try { todos = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e){ todos=[]; }

function saveTodos(){
  localStorage.setItem(STORE_KEY, JSON.stringify(todos));
  buildStrips();
  buildTaskLamps();
}

function renderTodos(){
  const list = document.getElementById('todo-list');
  list.innerHTML = '';
  todos.forEach((t,i)=>{
    const item = document.createElement('div');
    item.className = 'td-item' + (t.done?' done':'');
    item.innerHTML = `
      <div class="td-check">${t.done?'✓':''}</div>
      <span class="td-text">${t.text.replace(/</g,'&lt;')}</span>
      <button class="td-del" data-i="${i}">×</button>`;
    item.querySelector('.td-check').addEventListener('click',()=>{ todos[i].done=!todos[i].done; saveTodos(); renderTodos(); });
    item.querySelector('.td-text').addEventListener('click',()=>{ todos[i].done=!todos[i].done; saveTodos(); renderTodos(); });
    item.querySelector('.td-del').addEventListener('click',e=>{ e.stopPropagation(); todos.splice(i,1); saveTodos(); renderTodos(); });
    list.appendChild(item);
  });
}

function addTodo(){
  const inp = document.getElementById('todo-input');
  const text = inp.value.trim();
  if(!text) return;
  todos.unshift({text, done:false, id:Date.now()});
  saveTodos(); renderTodos();
  inp.value = '';
}

document.getElementById('todo-add-btn').addEventListener('click', addTodo);
document.getElementById('todo-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addTodo(); });
const todoFab = document.getElementById('todo-fab');
const todoPanel = document.getElementById('todo-panel');
todoFab.addEventListener('click',()=>todoPanel.classList.toggle('hidden'));
document.getElementById('td-close').addEventListener('click',()=>todoPanel.classList.add('hidden'));

renderTodos();
buildStrips();
buildTaskLamps();

// ── Animate ───────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameN=0;
function animate(){
  requestAnimationFrame(animate);
  frameN++;
  if(IS_MOBILE && frameN%2!==0) return;
  const elapsed=clock.getElapsedTime();
  // no per-frame tick needed for lamps
  scene.fog.density=FOG_BASE*AMB.fogDensity;
  controls.update();
  renderer.render(scene,camera);
}
animate();
